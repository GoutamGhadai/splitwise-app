        function Dashboard({ trip, guestSummaries, onSetAsMe }) {
            const dashboardStats = useMemo(() => {
                if (!trip || !trip.guests || trip.guests.length === 0) {
                    return {
                        totalCost: 0,
                        yourBalance: 0,
                        topSpender: { name: 'N/A', amount: 0 }
                    };
                }

                // 1. Total Trip Cost (ignore settlements)
                const totalCost = trip.expenses.reduce((sum, expense) => expense.isSettlement ? sum : sum + parseFloat(expense.amount), 0);

                // 2. "Your" Balance
                const you = trip.guests.find(g => g.id === trip.meId) || trip.guests[0];
                const yourSummary = guestSummaries[you.id] || { paid: 0, share: 0 };
                const yourBalance = yourSummary.paid - yourSummary.share;

                // 3. Top Spender
                let topSpender = { name: 'N/A', amount: 0 };
                if (trip.guests.length > 0) {
                    topSpender = trip.guests.reduce((currentTop, guest) => {
                        const guestPaid = guestSummaries[guest.id]?.paid || 0;
                        if (guestPaid > currentTop.amount) {
                            return { name: guest.name, amount: guestPaid };
                        }
                        return currentTop;
                    }, { name: trip.guests[0].name, amount: guestSummaries[trip.guests[0].id]?.paid || 0 });
                }

                return { totalCost, yourBalance, topSpender };
            }, [trip, guestSummaries]);

        function SpendingChart({ expenses, guests, theme }) {
            const [filterId, setFilterId] = useState('All');

            const data = useMemo(() => {
                if (!expenses || expenses.length === 0) return [];

                const dailyTotals = {};

                expenses.forEach(expense => {
                    if (expense.isSettlement) return; // Skip settlements from timeline
                    const date = expense.date; // YYYY-MM-DD
                    let amountToAdd = 0;

                    if (filterId === 'All') {
                        amountToAdd = parseFloat(expense.amount);
                    } else {
                        // Calculate share for the selected person
                        const totalAmount = parseFloat(expense.amount);
                        
                        if (expense.splitType === 'equally') {
                            if (expense.splitWith.includes(filterId)) {
                                amountToAdd = totalAmount / expense.splitWith.length;
                            }
                        } else if (expense.splitType === 'amounts') {

                        } else if (expense.splitType === 'percentages') {

                            amountToAdd = totalAmount * (percentage / 100);
                        }
                    }

                    if (amountToAdd > 0) {
                        dailyTotals[date] = (dailyTotals[date] || 0) + amountToAdd;
                    }
                });

                return Object.entries(dailyTotals)

                    .sort((a, b) => new Date(a.date) - new Date(b.date));

        function formatTimeAgo(isoString) {
            const date = new Date(isoString);
            const now = new Date();
            const seconds = Math.round((now - date) / 1000);
            const minutes = Math.round(seconds / 60);
            const hours = Math.round(minutes / 60);
            const days = Math.round(hours / 24);

            if (seconds < 60) return `${seconds}s ago`;
            if (minutes < 60) return `${minutes}m ago`;
            if (hours < 24) return `${hours}h ago`;
            if (days < 7) return `${days}d ago`;
            
            return date.toLocaleDateString();
        }

        function PieChart({ data }) {
            const radius = 50;
            const circumference = 2 * Math.PI * radius;
            const [isMounted, setIsMounted] = useState(false);
            useEffect(() => {
                const timer = setTimeout(() => setIsMounted(true), 100);
                return () => clearTimeout(timer);
            }, []);

            let cumulativeAngle = 0;

            return (
                <svg viewBox="0 0 120 120" className="w-40 h-40 flex-shrink-0 drop-shadow-xl">
                    <g transform="rotate(-90 60 60)">
                        {data.map(item => {
                            const total = data.reduce((sum, i) => sum + i.amount, 0);
                            if (total === 0) return null;
                            const percent = item.amount / total;
                            const dashArray = percent * circumference;
                            
                            const rotation = cumulativeAngle;
                            cumulativeAngle += percent * 360;

                            return (
                                <circle
                                    key={item.name}
                                    cx="60"
                                    cy="60"
                                    r={radius}
                                    fill="transparent"
                                    stroke={CATEGORY_COLORS[item.name]}
                                    strokeWidth="20"
                                    strokeDasharray={circumference}
                                    strokeDashoffset={isMounted ? circumference - dashArray : circumference}
                                    style={{ 
                                        transform: `rotate(${rotation}deg)`, 
                                        transformOrigin: '50% 50%', 
                                        transition: 'stroke-dashoffset 1.2s cubic-bezier(0.34, 1.56, 0.64, 1)' 
                                    }}
                                    className="hover:opacity-80 transition-opacity cursor-pointer"
                                />
                            );
                        })}
                    </g>
                </svg>
            );
        }

        function ExpenseModal({ isOpen, onClose, onAddExpense, onUpdateExpense, guests, expenseToEdit }) {
            const [description, setDescription] = useState('');
            const [amount, setAmount] = useState('');
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [paidById, setPaidById] = useState('');
            const [splitWith, setSplitWith] = useState([]);
            const [category, setCategory] = useState(CATEGORIES[0]);
            const [splitType, setSplitType] = useState('equally');
            const [splitDetails, setSplitDetails] = useState({});
            const [error, setError] = useState('');
            const [isAnimating, setIsAnimating] = useState(false);

            useEffect(() => {
                if (isOpen) {
                    setError('');
                    if(expenseToEdit) {
                        setDescription(expenseToEdit.description);
                        setAmount(expenseToEdit.amount.toString());
                        setDate(expenseToEdit.date);
                        setPaidById(expenseToEdit.paidById);
                        setSplitWith(expenseToEdit.splitWith || []);
                        setCategory(expenseToEdit.category || CATEGORIES[0]);
                        setSplitType(expenseToEdit.splitType || 'equally');
                        const details = guests.reduce((acc, g) => ({...acc, [g.id]: ''}), {});
                        if (expenseToEdit.splitDetails) {
                            Object.assign(details, expenseToEdit.splitDetails);
                        }
                        setSplitDetails(details);
                    } else {
                        const firstGuestId = guests.length > 0 ? guests[0].id : '';
                        setDescription('');
                        setAmount('');
                        setDate(new Date().toISOString().split('T')[0]);
                        setPaidById(firstGuestId);
                        setSplitWith(guests.map(g => g.id));
                        setCategory(CATEGORIES[0]);
                        setSplitType('equally');
                        setSplitDetails(guests.reduce((acc, g) => ({...acc, [g.id]: ''}), {}));
                    }
                     requestAnimationFrame(() => setIsAnimating(true));
                } else {
                     setIsAnimating(false);
                }
            }, [isOpen, guests, expenseToEdit]);

            const handleClose = () => {
                setIsAnimating(false);
                setTimeout(onClose, 300);
            };

            const handleDetailChange = (guestId, value) => {
                setSplitDetails(prev => ({ ...prev, [guestId]: value }));
            };

            const unevenSplitTotal = useMemo(() => {
                return Object.entries(splitDetails).reduce((total, [guestId, value]) => {
                    if (splitWith.includes(guestId)) {
                        return total + (parseFloat(value) || 0);
                    }
                    return total;
                }, 0);
            }, [splitDetails, splitWith]);

            let remainder = 0;
            let remainderText = '';
            let isOver = false;
            const numAmount = parseFloat(amount) || 0;

            if (splitType === 'amounts') {
                remainder = numAmount - unevenSplitTotal;
                isOver = remainder < -0.01;
                if (Math.abs(remainder) > 0.01 && numAmount > 0) {
                    remainderText = isOver ? `₹${Math.abs(remainder).toFixed(2)} over assigned` : `₹${remainder.toFixed(2)} left to assign`;
                }
            } else if (splitType === 'percentages') {
                remainder = 100 - unevenSplitTotal;
                isOver = remainder < -0.01;
                if (Math.abs(remainder) > 0.01) {
                    remainderText = isOver ? `${Math.abs(remainder).toFixed(2)}% over assigned` : `${remainder.toFixed(2)}% left to assign`;
                }
            }

            const handleSubmit = (e) => {
                e.preventDefault();
                const numAmount = parseFloat(amount);
                if (!description.trim()) { setError('Description is required.'); return; }
                if (isNaN(numAmount) || numAmount <= 0) { setError('Please enter a valid positive amount.'); return; }
                if (!paidById) { setError('Please select who paid.'); return; }
                if (splitWith.length === 0) { setError('Please select at least one person to split with.'); return; }

                if (splitType === 'amounts') {
                    if (Math.abs(unevenSplitTotal - numAmount) > 0.01) {
                        setError(`The sum of amounts (₹${unevenSplitTotal.toFixed(2)}) must equal the total expense (₹${numAmount.toFixed(2)}).`);
                        return;
                    }
                } else if (splitType === 'percentages') {
                    if (Math.abs(unevenSplitTotal - 100) > 0.01) {
                        setError(`The sum of percentages (${unevenSplitTotal.toFixed(2)}%) must be 100%.`);
                        return;
                    }
                }
                
                const finalSplitDetails = Object.entries(splitDetails).reduce((acc, [guestId, value]) => {
                    if (splitWith.includes(guestId) && (value || 0) > 0) {
                        acc[guestId] = value;
                    }
                    return acc;
                }, {});

                const expenseData = { description: description.trim(), amount: numAmount, date, paidById, splitWith, category, splitType, splitDetails: finalSplitDetails };
                if (expenseToEdit) {
                    onUpdateExpense(expenseToEdit.id, expenseData);
                } else {
                    onAddExpense(expenseData);
                }
                handleClose();
            };
            
            if (!isOpen && !isAnimating) return null;

            return (
                <div 
                    className={`fixed inset-0 z-50 flex justify-center items-start p-4 bg-black overflow-y-auto transition-opacity duration-300 ${isAnimating ? 'bg-opacity-70' : 'bg-opacity-0'}`}
                    onClick={handleClose}
                >
                    <div 
                        className={`glass-modal rounded-xl shadow-2xl w-full max-w-lg p-6 my-8 transform transition-all duration-400 cubic-bezier(0.34, 1.56, 0.64, 1) ${isAnimating ? 'translate-y-0 opacity-100 scale-100' : 'translate-y-10 opacity-0 scale-95'}`}
                        onClick={e => e.stopPropagation()}
                    >
                        <h2 className="text-2xl font-bold mb-6 text-white">{expenseToEdit ? 'Edit Expense' : 'Add an Expense'}</h2>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block font-semibold mb-1 text-slate-300">Description</label>
                                <input type="text" value={description} onChange={e => setDescription(e.target.value)} placeholder="e.g., Dinner, Groceries" className="w-full p-2 bg-slate-700/50 border border-slate-600 rounded-md text-white transition-all focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500" />
                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div>
                                   <label className="block font-semibold mb-1 text-slate-300">Amount (₹)</label>
                                   <input type="number" value={amount} onChange={e => setAmount(e.target.value)} placeholder="0.00" className="w-full p-2 bg-slate-700/50 border border-slate-600 rounded-md text-white transition-all focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500" min="0.01" step="0.01" />
                                </div>
                                 <div>
                                    <label className="block font-semibold mb-1 text-slate-300">Category</label>
                                    <select value={category} onChange={e => setCategory(e.target.value)} className="w-full p-2 bg-slate-700/50 border border-slate-600 rounded-md text-white transition-all focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500">
                                        {CATEGORIES.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                    </select>
                                </div>
                            </div>
                             <div>
                                <label className="block font-semibold mb-1 text-slate-300">Date</label>
                                <input type="date" value={date} onChange={e => setDate(e.target.value)} className="w-full p-2 bg-slate-700/50 border border-slate-600 rounded-md text-white transition-all focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500" />
                            </div>
                            <div>
                                <label className="block font-semibold mb-1 text-slate-300">Paid by</label>
                                <select value={paidById} onChange={e => setPaidById(e.target.value)} className="w-full p-2 bg-slate-700/50 border border-slate-600 rounded-md text-white transition-all focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500">
                                    <option value="" disabled>Select a person</option>
                                    {guests.map(g => <option key={g.id} value={g.id}>{g.name}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="block font-semibold mb-2 text-slate-300">Split</label>
                                <div className="flex items-center gap-4 mb-3 bg-slate-700/50 rounded-lg p-1">
                                    {['equally', 'amounts', 'percentages'].map(type => (
                                        <button key={type} type="button" onClick={() => setSplitType(type)} className={`flex-1 py-1 px-2 text-sm rounded-md capitalize transition-all active:scale-95 ${splitType === type ? 'bg-cyan-500 text-white shadow-md' : 'bg-transparent text-slate-300 hover:bg-slate-600'}`}>
                                            {type}
                                        </button>
                                    ))}
                                </div>
                                <div className="space-y-2 max-h-48 overflow-y-auto pr-1">
                                    {guests.map(g => (
                                        <div key={g.id} className={`flex items-center gap-2 p-2 rounded-md transition-all duration-300 ${splitWith.includes(g.id) ? 'bg-cyan-500/20' : 'bg-slate-700/30'} interactive-item hover:-translate-y-0.5`}>
                                            <input 
                                                type="checkbox" 
                                                checked={splitWith.includes(g.id)} 
                                                onChange={() => setSplitWith(prev => prev.includes(g.id) ? prev.filter(id => id !== g.id) : [...prev, g.id])}
                                                className="h-4 w-4 rounded bg-slate-600 border-slate-500 text-cyan-500 focus:ring-cyan-500 transition-colors" 
                                            />
                                            <Avatar name={g.name} size="sm" />
                                            <label className="flex-1 cursor-pointer text-slate-200">{g.name}</label>
                                            {splitType !== 'equally' && splitWith.includes(g.id) && (
                                                <div className="flex items-center gap-2 animate-fadeInUp" style={{animationDuration: '0.3s'}}>
                                                    <div className="relative">
                                                        {splitType === 'amounts' && <span className="absolute left-2 top-1/2 -translate-y-1/2 text-slate-400">₹</span>}
                                                        <input 
                                                            type="number" 
                                                            value={splitDetails[g.id] || ''}
                                                            onChange={(e) => handleDetailChange(g.id, e.target.value)}
                                                            className={`w-24 p-1 border rounded-md bg-slate-800 border-slate-600 text-white transition-all focus:ring-1 focus:ring-cyan-500 focus:border-cyan-500 ${splitType === 'amounts' ? 'pl-5' : 'pr-5'}`}
                                                            placeholder="0.00"
                                                            min="0"
                                                            step="0.01"
                                                        />
                                                        {splitType === 'percentages' && <span className="absolute right-2 top-1/2 -translate-y-1/2 text-slate-400">%</span>}
                                                    </div>
                                                    {splitType !== 'equally' && remainder > 0.01 && splitWith.includes(g.id) && (
                                                        <button 
                                                            type="button" 
                                                            onClick={() => handleDetailChange(g.id, (parseFloat(splitDetails[g.id] || 0) + remainder).toFixed(2))}
                                                            className="text-[10px] bg-slate-700 hover:bg-slate-600 text-cyan-400 px-2 py-1 rounded-md transition-colors shadow-sm"
                                                        >
                                                            + Fill
                                                        </button>
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                                {splitType !== 'equally' && (
                                    <div className="flex justify-end items-center mt-2 pr-2 gap-3">
                                        {remainderText && (
                                            <span className={`text-sm font-semibold ${isOver ? 'text-rose-400' : 'text-emerald-400'}`}>
                                                {remainderText}
                                            </span>
                                        )}
                                        <div className="text-sm font-bold text-slate-300">
                                            Total: {unevenSplitTotal.toFixed(2)}{splitType === 'percentages' ? '%' : ''}
                                        </div>
                                    </div>
                                )}
                            </div>
                            {error && <p className="text-rose-400 text-sm font-semibold animate-fadeInUp">{error}</p>}
                            <div className="flex justify-end gap-4 pt-4">
                                <button type="button" onClick={handleClose} className="py-2 px-4 bg-slate-700 hover:bg-slate-600 rounded-md font-semibold transition-all active:scale-95 text-white hover:-translate-y-0.5">Cancel</button>
                                <button type="submit" className="py-2 px-4 bg-emerald-500 hover:bg-emerald-600 text-white rounded-md font-semibold transition-all active:scale-95 shadow-lg shadow-emerald-500/30 hover:-translate-y-0.5 hover:shadow-emerald-500/50">
                                    {expenseToEdit ? 'Save Changes' : 'Add Expense'}
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        function ConfirmationModal({ isOpen, onClose, onConfirm, title, confirmButtonText, cancelButtonText, children, isDestructive }) {
            const [isAnimating, setIsAnimating] = useState(false);

            useEffect(() => {
                if (isOpen) {
                    requestAnimationFrame(() => setIsAnimating(true));
                } else {
                    setIsAnimating(false);
                }
            }, [isOpen]);

            const handleClose = () => {
                setIsAnimating(false);
                setTimeout(onClose, 300);
            };

             const handleConfirm = () => {
                onConfirm();
                // handleClose(); // The confirm handler now closes the modal.
            };

            if (!isOpen && !isAnimating) return null;

            return (
                <div 
                    className={`fixed inset-0 z-50 flex items-center justify-center p-4 bg-black transition-opacity duration-300 ${isAnimating ? 'bg-opacity-70' : 'bg-opacity-0'}`}
                    onClick={handleClose}
                >
                    <div 
                        className={`glass-modal rounded-xl shadow-xl w-full max-w-md p-6 transform transition-all duration-400 cubic-bezier(0.34, 1.56, 0.64, 1) ${isAnimating ? 'scale-100 opacity-100' : 'scale-95 opacity-0'}`}
                        onClick={e => e.stopPropagation()}
                    >
                        <h3 className="text-xl font-bold mb-4 text-white">{title}</h3>
                        <div className="text-slate-300 mb-8">{children}</div>
                        <div className="flex justify-end gap-4">
                            <button 
                                onClick={handleClose} 
                                className="py-2 px-5 bg-slate-700 hover:bg-slate-600 text-white rounded-md font-semibold transition-all active:scale-95 hover:-translate-y-0.5"
                            >
                                {cancelButtonText || 'Cancel'}
                            </button>
                            <button 
                                onClick={handleConfirm} 
                                className={`py-2 px-5 text-white rounded-md font-semibold transition-all active:scale-95 hover:-translate-y-0.5 ${isDestructive ? 'bg-red-600 hover:bg-red-700 shadow-lg shadow-red-500/30 hover:shadow-red-500/50' : 'bg-indigo-600 hover:bg-indigo-700 shadow-lg shadow-indigo-500/30 hover:shadow-indigo-500/50'}`}
                            >
                                {confirmButtonText}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);

    </script>
</body>
</html>
