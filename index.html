    <script type="text/babel">
        // --- React Application Code ---
        const { useState, useEffect, useMemo } = React;

        // --- Helper Functions & Constants ---
        const APP_STORAGE_KEY = 'shareFareAppData_v2';
        const TOUR_STORAGE_KEY = 'shareFareTourCompleted_v1';
        const THEME_STORAGE_KEY = 'shareFareTheme_v1';
        const CATEGORIES = ['Food', 'Travel', 'Accommodation', 'Shopping', 'Activities', 'Other'];
        const CATEGORY_COLORS = {
            Food: '#f59e0b', // amber-500
            Travel: '#3b82f6', // blue-500
            Accommodation: '#8b5cf6', // violet-500
            Shopping: '#ec4899', // pink-500
            Activities: '#10b981', // emerald-500
            Other: '#64748b', // slate-500
        };
        const AVATAR_COLORS = ['#f87171', '#fb923c', '#facc15', '#4ade80', '#38bdf8', '#a78bfa', '#f472b6'];
        const CHART_PALETTE = ['#38bdf8', '#818cf8', '#c084fc', '#f472b6', '#fb7185', '#facc15', '#4ade80', '#2dd4bf', '#f87171', '#fb923c'];

        const generateId = () => `_${Math.random().toString(36).substr(2, 9)}`;

        const getInitials = (name = '') => {
            const parts = name.trim().split(' ');
            if (parts.length > 1 && parts[parts.length - 1]) {
                return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
            }
            return name.substring(0, 2).toUpperCase();
        };

        const generateAvatarColor = (name = '') => {
            const charCodeSum = name.split('').reduce((sum, char) => sum + char.charCodeAt(0), 0);
            return AVATAR_COLORS[charCodeSum % AVATAR_COLORS.length];
        };

        const calculateSettlement = (trip) => {
            if (!trip || trip.guests.length < 2) {
                return { transactions: [] };
            }
            
            const { guests, expenses } = trip;
            const balances = guests.reduce((acc, guest) => ({ ...acc, [guest.id]: 0 }), {});

            expenses.forEach(expense => {
                const totalAmount = parseFloat(expense.amount);
                if (balances[expense.paidById] !== undefined) {
                    balances[expense.paidById] += totalAmount;
                }

                switch (expense.splitType) {
                    case 'amounts':
                        Object.entries(expense.splitDetails || {}).forEach(([guestId, amount]) => {
                            if (balances[guestId] !== undefined) {
                                balances[guestId] -= parseFloat(amount);
                            }
                        });
                        break;
                    case 'percentages':
                        Object.entries(expense.splitDetails || {}).forEach(([guestId, percentage]) => {
                            if (balances[guestId] !== undefined) {
                                const share = totalAmount * (parseFloat(percentage) / 100);
                                balances[guestId] -= share;
                            }
                        });
                        break;
                    default: // 'equally'
                        if (expense.splitWith.length > 0) {
                            const share = totalAmount / expense.splitWith.length;
                            expense.splitWith.forEach(guestId => {
                                if (balances[guestId] !== undefined) {
                                    balances[guestId] -= share;
                                }
                            });
                        }
                        break;
                }
            });

            const debtors = [];
            const creditors = [];
            Object.entries(balances).forEach(([guestId, balance]) => {
                if (balance < -0.01) debtors.push({ id: guestId, amount: -balance });
                else if (balance > 0.01) creditors.push({ id: guestId, amount: balance });
            });
            
            const transactions = [];
            let debtorIndex = 0, creditorIndex = 0;
            while (debtorIndex < debtors.length && creditorIndex < creditors.length) {
                const debtor = debtors[debtorIndex];
                const creditor = creditors[creditorIndex];
                const amountToSettle = Math.min(debtor.amount, creditor.amount);

                if (amountToSettle > 0.01) {
                    transactions.push({ from: debtor.id, to: creditor.id, amount: amountToSettle });
                }
                debtor.amount -= amountToSettle;
                creditor.amount -= amountToSettle;
                if (debtor.amount < 0.01) debtorIndex++;
                if (creditor.amount < 0.01) creditorIndex++;
            }

            return { transactions };
        };

                <path strokeLinecap="round" strokeLinejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z" />

        const WalletIcon = () => (

        const StarIcon = () => (
             <svg xmlns="http://www.w3.org/2000/svg" className="h-8 w-8" fill="none" viewBox="0 0 24 24" strokeWidth="1.5" stroke="currentColor">

        const PresentationChartIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M8 13v-1m4 1v-3m4 3V8M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" />

        const TableIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />

        const ChartViewIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
            </svg>
        );

        // --- Main App Component ---
        function App() {
            // --- State Management ---
            const [trips, setTrips] = useState([]);
            const [activeTripId, setActiveTripId] = useState(null);
            const [expandedTripId, setExpandedTripId] = useState(null);
            const [theme, setTheme] = useState('light');
            const [filterPaidBy, setFilterPaidBy] = useState('All');
            const [expenseSearchQuery, setExpenseSearchQuery] = useState('');
            
            const [isGuestModalOpen, setGuestModalOpen] = useState(false);
            const [isExpenseModalOpen, setExpenseModalOpen] = useState(false);
            const [isTripModalOpen, setTripModalOpen] = useState(false);
            const [isTourOpen, setIsTourOpen] = useState(false);
            const [isDataModalOpen, setIsDataModalOpen] = useState(false);
            const [isAnalyticsOpen, setIsAnalyticsOpen] = useState(false);
            const [tourStep, setTourStep] = useState(0);
            const [isUpdateExpensesModalOpen, setUpdateExpensesModalOpen] = useState(false);
            const [editingTrip, setEditingTrip] = useState(null);
            const [editingGuestId, setEditingGuestId] = useState(null);
            const [editingExpenseId, setEditingExpenseId] = useState(null);
            const [expandedSettlementIndex, setExpandedSettlementIndex] = useState(null);
            const [confirmAction, setConfirmAction] = useState(null);
            const [actionTargetId, setActionTargetId] = useState(null);
            const [copiedTripId, setCopiedTripId] = useState(null);
            const [showTourHint, setShowTourHint] = useState(false);

            // --- Theme Management ---
            useEffect(() => {
                const savedTheme = localStorage.getItem(THEME_STORAGE_KEY);
                setTheme(savedTheme || 'light');
            }, []);

            useEffect(() => {
                document.body.className = '';
                document.body.classList.add(theme);
                localStorage.setItem(THEME_STORAGE_KEY, theme);
            }, [theme]);

            const toggleTheme = () => {
                setTheme(prevTheme => prevTheme === 'dark' ? 'light' : 'dark');
            };

            // --- Data Persistence using localStorage ---
            useEffect(() => {
                try {
                    const savedData = localStorage.getItem(APP_STORAGE_KEY);
                    if (savedData) {
                        const parsedData = JSON.parse(savedData);
                        const sanitizedTrips = (parsedData.trips || []).map(trip => ({
                            ...trip,
                            paidSettlements: trip.paidSettlements || {},
                            history: trip.history || [],
                        }));
                        setTrips(sanitizedTrips);
                    }
                } catch (error) {
                    console.error("Failed to load data from localStorage", error);
                }

                // Check if tour has been completed
                const tourCompleted = localStorage.getItem(TOUR_STORAGE_KEY);
                if (!tourCompleted) {
                    setShowTourHint(true);
                }
            }, []);

            useEffect(() => {
                try {
                    // Only save the trips data, not the active trip state, for a fresh start.
                    const dataToSave = JSON.stringify({ trips });
                    localStorage.setItem(APP_STORAGE_KEY, dataToSave);
                } catch (error) {
                    console.error("Failed to save data to localStorage", error);
                }
            }, [trips]);

            useEffect(() => {
                setFilterPaidBy('All');
                setExpenseSearchQuery('');
            }, [activeTripId]);

            const startTour = () => {
                setShowTourHint(false);
                if (trips.length === 0) {
                    const sampleTrip = {
                        id: 'sample-trip',
                        name: 'Sample Trip to Goa',
                        date: new Date().toISOString().split('T')[0],
                        meId: 'guest1',
                        guests: [
                            {id: 'guest1', name: 'You'},
                            {id: 'guest2', name: 'Alex'},
                        ],
                        expenses: [
                           {id: 'exp1', description: 'Lunch', amount: 3000, date: new Date().toISOString().split('T')[0], paidById: 'guest1', splitWith: ['guest1', 'guest2'], category: 'Food', splitType: 'equally', splitDetails: {}},
                        ],
                        paidSettlements: {},
                        history: [],
                        isSample: true,
                    };
                    setTrips([sampleTrip]);
                }
                setTourStep(0);
                setIsTourOpen(true);
            };

            const handleCloseTour = () => {
                setIsTourOpen(false);
                localStorage.setItem(TOUR_STORAGE_KEY, 'true');
                setTrips(prev => prev.filter(t => !t.isSample));
                if (activeTripId === 'sample-trip') {
                    setActiveTripId(null);
                }
            };
            
            // --- Handlers for Trips ---
            const handleTripAction = (tripData) => {
                if (editingTrip) { // Update existing trip
                     setTrips(prevTrips => prevTrips.map(trip => {
                        if (trip.id === editingTrip.id) {
                            const message = `The trip name was changed from "${trip.name}" to "${tripData.name}".`;
                            const newLog = {
                                id: generateId(),
                                message,
                                timestamp: new Date().toISOString()
                            };
                            return {
                                ...trip,
                                name: tripData.name,
                                date: tripData.date,
                                history: [newLog, ...(trip.history || [])]
                            };
                        }
                        return trip;
                    }));
                } else { // Create new trip
                    const newTrip = { id: generateId(), name: tripData.name, date: tripData.date, meId: null, guests: [], expenses: [], paidSettlements: {}, history: [] };
                    const message = `Trip "${newTrip.name}" was created.`;
                    const newLog = { id: generateId(), message, timestamp: new Date().toISOString() };
                    newTrip.history.unshift(newLog);
                    
                    setTrips(prev => [...prev, newTrip]);
                    setActiveTripId(newTrip.id);
                }
                setTripModalOpen(false);
                setEditingTrip(null);
            };

            const handleEditTrip = (trip) => {
                setEditingTrip(trip);
                setTripModalOpen(true);
            };

            const deleteTrip = (tripId) => {
                setTrips(prev => prev.filter(t => t.id !== tripId));
            };
            
            const modifyActiveTrip = (updater, activityMessage) => {
                setTrips(prevTrips =>
                    prevTrips.map(t => {
                        if (t.id === activeTripId) {
                            const updatedTrip = updater(t);
                            if (activityMessage) {
                                const newLog = {
                                    id: generateId(),
                                    message: activityMessage,
                                    timestamp: new Date().toISOString()
                                };
                                updatedTrip.history = [newLog, ...(updatedTrip.history || [])];
                            }
                            return updatedTrip;
                        }
                        return t;
                    })
                );
            };
            
            const handleTogglePaid = (tripId, settlementKey) => {
                setTrips(prevTrips => prevTrips.map(trip => {
                    if (trip.id === tripId) {
                        const newPaidSettlements = { ...(trip.paidSettlements || {}) };
                        if (newPaidSettlements[settlementKey]) {
                            delete newPaidSettlements[settlementKey];
                        } else {
                            newPaidSettlements[settlementKey] = true;
                        }
                        return { ...trip, paidSettlements: newPaidSettlements };
                    }
                    return trip;
                }));
            };

            const fallbackCopyTextToClipboard = (text, tripId) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                
                textArea.style.position = 'fixed';
                textArea.style.top = '-9999px';
                textArea.style.left = '-9999px';
                textArea.style.opacity = '0';

                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();

                try {
                    const successful = document.execCommand('copy');
                    if (successful) {
                        setCopiedTripId(tripId);
                        setTimeout(() => setCopiedTripId(null), 2000);
                    }
                } catch (err) {
                    console.error('Fallback copy failed', err);
                }

                document.body.removeChild(textArea);
            };
            
            const handleCopySummary = (trip) => {
                const { transactions } = calculateSettlement(trip);
                if (transactions.length === 0) return;

                const tripGuestMap = trip.guests.reduce((map, guest) => ({...map, [guest.id]: guest.name}), {});

                let summaryText = `Settlement Summary for "${trip.name}":\n`;
                transactions.forEach(t => {
                    const fromName = tripGuestMap[t.from];
                    const toName = tripGuestMap[t.to];
                    const amount = t.amount.toFixed(2);
                    summaryText += `- ${fromName} owes ${toName}: ₹${amount}\n`;
                });

                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(summaryText).then(() => {
                        setCopiedTripId(trip.id);
                        setTimeout(() => setCopiedTripId(null), 2000);
                    }).catch(() => {
                        fallbackCopyTextToClipboard(summaryText, trip.id);
                    });
                } else {
                    fallbackCopyTextToClipboard(summaryText, trip.id);
                }
            };

             const _performAddGuest = (name, message) => {
                const newGuest = { id: generateId(), name };
                const logMessage = message || `${name} was added to the trip.`;
                modifyActiveTrip(trip => {
                    const updatedGuests = [...trip.guests, newGuest];
                    const meId = trip.meId || (trip.guests.length === 0 ? newGuest.id : null);
                    return { ...trip, guests: updatedGuests, meId };
                }, logMessage);
            };

            const handleSetAsMe = (guestId) => {
                const guestName = activeTrip.guests.find(g => g.id === guestId)?.name;
                modifyActiveTrip(trip => ({ ...trip, meId: guestId }), `Set user identity to ${guestName}.`);
            };

            // --- Handlers for Guests & Expenses (now operate on the active trip) ---
            const addGuest = (name) => {
                if (name && activeTrip && !activeTrip.guests.some(g => g.name === name)) {
                    const potentialExpensesToUpdate = activeTrip.expenses.filter(exp =>
                        exp.splitType === 'equally'
                    );

                    if (potentialExpensesToUpdate.length > 0) {
                        setActionTargetId({ guestName: name, expensesToUpdate: potentialExpensesToUpdate });
                        setUpdateExpensesModalOpen(true);
                    } else {
                        _performAddGuest(name);
                    }
                }
            };

            const updateGuest = (id, newName) => {
                const oldGuest = activeTrip?.guests.find(g => g.id === id);
                if (!oldGuest) return;

                if (activeTrip.guests.some(g => g.name.toLowerCase() === newName.toLowerCase() && g.id !== id)) {
                    console.error("Guest name already exists");
                    // Optionally, set an error state to show in the modal
                    return;
                }

                const message = `${oldGuest.name}'s name was changed to ${newName}.`;
                modifyActiveTrip(trip => ({
                    ...trip,
                    guests: trip.guests.map(g => (g.id === id ? { ...g, name: newName } : g))
                }), message);
            };

            const handleOpenEditGuestModal = (guestId) => {
                setEditingGuestId(guestId);
                setGuestModalOpen(true);
            };
            
            const removeGuest = (id) => {
                const guestName = activeTrip?.guests.find(g => g.id === id)?.name;
                if (!guestName) return;

                const updater = trip => {
                    const updatedExpenses = trip.expenses
                        .filter(exp => exp.paidById !== id)
                        .map(exp => ({ ...exp, splitWith: exp.splitWith.filter(guestId => guestId !== id) }))
                        .filter(exp => exp.splitWith.length > 0);
                    return { ...trip, guests: trip.guests.filter(g => g.id !== id), expenses: updatedExpenses, paidSettlements: {} };
                };
                modifyActiveTrip(updater, `${guestName} was removed from the trip.`);
            };

            const addExpense = (expense) => {
                const payerName = activeTrip?.guests.find(g => g.id === expense.paidById)?.name || 'Someone';
                const message = `${payerName} added "${expense.description}" (₹${expense.amount.toFixed(2)}).`;
                modifyActiveTrip(trip => ({ ...trip, expenses: [...trip.expenses, { ...expense, id: generateId() }], paidSettlements: {} }), message);
            };
            
            const updateExpense = (id, updatedData) => {
                const message = `"${updatedData.description}" was edited.`;
                modifyActiveTrip(trip => ({ ...trip, expenses: trip.expenses.map(exp => (exp.id === id ? { ...exp, ...updatedData } : exp)), paidSettlements: {} }), message);
                setEditingExpenseId(null);
            };
            
            const removeExpense = (id) => {
                const expense = activeTrip?.expenses.find(e => e.id === id);
                if (!expense) return;
                const message = `"${expense.description}" was removed.`;
                modifyActiveTrip(trip => ({...trip, expenses: trip.expenses.filter(exp => exp.id !== id), paidSettlements: {} }), message);
            };

            const handleModalClose = () => {
                setConfirmAction(null);
                setActionTargetId(null);
            };

            const handleConfirmUpdateExpenses = (selectedExpenseIds) => {
                const { guestName } = actionTargetId;
                const newGuest = { id: generateId(), name: guestName };
                
                const updater = trip => {
                    const updatedGuests = [...trip.guests, newGuest];
                    const updatedExpenses = trip.expenses.map(exp => {
                        if (selectedExpenseIds.includes(exp.id)) {
                            return { ...exp, splitWith: [...exp.splitWith, newGuest.id] };
                        }
                        return exp;
                    });
                    return { ...trip, guests: updatedGuests, expenses: updatedExpenses, paidSettlements: {} };
                };

                let message;
                if (selectedExpenseIds.length > 0) {
                    message = `${guestName} was added and included in ${selectedExpenseIds.length} past expense(s).`;
                } else {
                    message = `${guestName} was added to the trip.`;
                }
                
                modifyActiveTrip(updater, message);
                setUpdateExpensesModalOpen(false);
                setActionTargetId(null);
            };

            const handleCloseUpdateExpensesModal = () => {
                const { guestName } = actionTargetId;
                _performAddGuest(guestName);
                setUpdateExpensesModalOpen(false);
                setActionTargetId(null);
            }

            const handleConfirm = () => {
                if (confirmAction === 'removeAllGuests') {
                    modifyActiveTrip(trip => ({ ...trip, guests: [], expenses: [], paidSettlements: {} }), 'All guests and expenses were removed.');
                } else if (confirmAction === 'removeAllExpenses') {
                    modifyActiveTrip(trip => ({ ...trip, expenses: [], paidSettlements: {} }), 'All expenses were removed.');
                } else if (confirmAction === 'deleteTrip') {
                    deleteTrip(actionTargetId);
                } else if (confirmAction === 'removeGuest') {
                    removeGuest(actionTargetId);
                } else if (confirmAction === 'removeExpense') {
                    removeExpense(actionTargetId);
                } else if (confirmAction === 'logSettlement') {
                    const t = actionTargetId;
                    const fromName = activeTrip?.guests.find(g => g.id === t.from)?.name;
                    const toName = activeTrip?.guests.find(g => g.id === t.to)?.name;
                    const newExpense = {
                        id: generateId(),
                        description: `Payment: ${fromName} → ${toName}`,
                        amount: t.amount,
                        date: new Date().toISOString().split('T')[0],
                        paidById: t.from,
                        splitWith: [t.to],
                        category: 'Settlement',
                        splitType: 'amounts',
                        splitDetails: { [t.to]: t.amount },
                        isSettlement: true
                    };
                    const message = `Recorded payment of ₹${t.amount.toFixed(2)} from ${fromName} to ${toName}.`;
                    modifyActiveTrip(trip => ({ ...trip, expenses: [...trip.expenses, newExpense], paidSettlements: {} }), message);
                }
                setConfirmAction(null);
                setActionTargetId(null);
            };
            
            const handleOpenAddExpenseModal = () => {
                setEditingExpenseId(null);
                setExpenseModalOpen(true);
            };

            const handleOpenEditExpenseModal = (id) => {
                setEditingExpenseId(id);
                setExpenseModalOpen(true);
            };

            const handleImportData = (importedTrips) => {
                setTrips(prevTrips => {
                    // Create a map of existing trips for O(1) lookup
                    const tripMap = new Map(prevTrips.map(t => [t.id, t]));
                    
                    // Update or add imported trips
                    importedTrips.forEach(t => {
                        tripMap.set(t.id, t);
                    });
                    
                    return Array.from(tripMap.values());
                });
            };

            // --- Derived State & Calculations (Memoized for performance) ---
            const activeTrip = useMemo(() => trips.find(t => t.id === activeTripId), [trips, activeTripId]);

            const settlement = useMemo(() => calculateSettlement(activeTrip), [activeTrip]);

            const filteredExpenses = useMemo(() => {
                if (!activeTrip) return [];
                let filtered = activeTrip.expenses;
                if (filterPaidBy !== 'All') {
                    filtered = filtered.filter(exp => exp.paidById === filterPaidBy);
                }
                if (expenseSearchQuery.trim()) {
                    const query = expenseSearchQuery.toLowerCase();
                    filtered = filtered.filter(exp => exp.description.toLowerCase().includes(query));
                }
                return filtered;
            }, [activeTrip, filterPaidBy, expenseSearchQuery]);

            const guestMap = useMemo(() => {
                if (!activeTrip) return {};
                return activeTrip.guests.reduce((map, guest) => ({...map, [guest.id]: guest.name}), {});
            }, [activeTrip]);

            const guestToEdit = useMemo(() => 
                activeTrip?.guests.find(g => g.id === editingGuestId), 
            [activeTrip, editingGuestId]);

            // Removed spendingOverTime calculation from App as it is now moved to SpendingChart component

            const guestSummaries = useMemo(() => {
                if (!activeTrip) return {};
            
                const summaries = activeTrip.guests.reduce((acc, guest) => {
                    acc[guest.id] = { paid: 0, share: 0 };
                    return acc;
                }, {});
            
                activeTrip.expenses.forEach(expense => {
                    const totalAmount = parseFloat(expense.amount);
                    if (isNaN(totalAmount) || totalAmount <= 0) return;
            
                    if (summaries[expense.paidById]) {
                        summaries[expense.paidById].paid += totalAmount;
                    }
            
                    switch (expense.splitType) {
                        case 'amounts':
                            Object.entries(expense.splitDetails || {}).forEach(([guestId, amount]) => {
                                if (summaries[guestId]) {
                                    summaries[guestId].share += parseFloat(amount);
                                }
                            });
                            break;
                        case 'percentages':
                             Object.entries(expense.splitDetails || {}).forEach(([guestId, percentage]) => {
                                if (summaries[guestId]) {
                                    const share = totalAmount * (parseFloat(percentage) / 100);
                                    summaries[guestId].share += share;
                                }
                            });
                            break;
                        default: // 'equally'
                            if (expense.splitWith.length > 0) {
                                const share = totalAmount / expense.splitWith.length;
                                expense.splitWith.forEach(guestId => {
                                    if (summaries[guestId]) {
                                        summaries[guestId].share += share;
                                    }
                                });
                            }
                            break;
                    }
                });
            
                return summaries;
            }, [activeTrip]);

            const categorySummary = useMemo(() => {
                if (!activeTrip || activeTrip.expenses.length === 0) return null;

                const summary = activeTrip.expenses.reduce((acc, expense) => {
                    if (expense.isSettlement) return acc;
                    const category = expense.category || 'Other';
                    const amount = parseFloat(expense.amount);
                    if (!isNaN(amount)) {
                        acc[category] = (acc[category] || 0) + amount;
                    }
                    return acc;
                }, {});
                
                return Object.entries(summary)
                    .map(([name, amount]) => ({ name, amount }))
                    .sort((a, b) => b.amount - a.amount);

            }, [activeTrip]);

            let modalTitle = '';
            let modalBody = null;
            let modalConfirmText = '';
            let modalCancelText = 'Cancel';
            let isDestructive = false;

            if (confirmAction === 'deleteTrip') {
                modalTitle = 'Delete Trip?';
                modalBody = <p>Are you sure? This action will permanently delete this trip and all its data. This cannot be undone.</p>;
                modalConfirmText = 'Yes, Delete Trip';
                isDestructive = true;
            } else if (confirmAction === 'removeAllGuests') {
                modalTitle = "Remove All Guests?";
                modalBody = <p>Are you sure? This will remove all guests and permanently delete all associated expenses.</p>;

                                                {copiedTripId === activeTrip.id ? 'Copied!' : <CopyIcon/>}
                                                {copiedTripId === activeTrip.id ? '' : 'Copy Summary'}

                                        <ul className="space-y-3">

                                                        title="Click to log this payment"

                                                        <div className="flex-1 min-w-0 flex items-center gap-2">
                                                            <Avatar name={guestMap[t.from]} size="sm" />
                                                            <p className={`${expandedSettlementIndex === index ? 'whitespace-normal' : 'truncate'} text-sm sm:text-base text-slate-300`}>
                                                                <span className="font-bold text-cyan-400">{guestMap[t.from]}</span>
                                                                <span className="text-slate-300"> owes </span>
                                                                <span className="font-bold text-emerald-400">{guestMap[t.to]}</span>
                                                            </p>
                                                            <Avatar name={guestMap[t.to]} size="sm" />
                                                        </div>
                                                        <div className="flex items-center gap-3">
                                                            <span className={`font-bold text-lg sm:text-xl text-white whitespace-nowrap`}>₹{t.amount.toFixed(2)}</span>
                                                            <button className="hidden sm:block bg-emerald-500/20 text-emerald-400 hover:bg-emerald-50 hover:text-white transition-all text-xs font-bold py-1.5 px-3 rounded-md">Log Payment</button>
                                                        </div>
                                                    </li>
                                                );
                                            })}
                                        </ul>
                                    </div>
                                )}
                                 {/* Activity Feed */}
                                {activeTrip.history && activeTrip.history.length > 0 && (
                                    <div className="glass-card p-5 rounded-2xl">
                                        <h2 className="text-2xl font-bold mb-4 flex items-center gap-2 text-white">
                                            <ActivityIcon />
                                            Activity History
                                        </h2>
                                        <ActivityFeed history={activeTrip.history} />
                                    </div>
                                )}
                                {activeTrip.expenses && activeTrip.expenses.length > 0 && (
                                <div className="animate-fadeInUp" style={{animationDelay: '0.6s', opacity: 0}}>
                                    <SpendingChart expenses={activeTrip.expenses} guests={activeTrip.guests} theme={theme} />
                                </div>
                            )}
                        </div>
                    </main>
                </div>
                
                {/* Modals */}
                <TourGuide 
                    isOpen={isTourOpen} 
                    onClose={handleCloseTour} 
                    activeTrip={activeTrip}
                    setActiveTripId={setActiveTripId}
                    trips={trips}
                    currentStep={tourStep}
                    setCurrentStep={setTourStep}
                />
                <UpdatePastExpensesModal
                    isOpen={isUpdateExpensesModalOpen}
                    onClose={handleCloseUpdateExpensesModal}
                    onConfirm={handleConfirmUpdateExpenses}
                    guestName={actionTargetId?.guestName}
                    expensesToUpdate={actionTargetId?.expensesToUpdate || []}
                />
                <GuestModal 
                    isOpen={isGuestModalOpen} 
                    onClose={() => { setGuestModalOpen(false); setEditingGuestId(null); }} 
                    onAddGuest={addGuest} 
                    onUpdateGuest={updateGuest}
                    guestToEdit={guestToEdit}
                    existingGuests={activeTrip?.guests || []}
                />
                <ExpenseModal 
                    isOpen={isExpenseModalOpen} 
                    onClose={() => { setExpenseModalOpen(false); setEditingExpenseId(null); }} 
                    onAddExpense={addExpense} 
                    onUpdateExpense={updateExpense}
                    guests={activeTrip.guests}
                    expenseToEdit={activeTrip.expenses.find(exp => exp.id === editingExpenseId)}
                />
                <DataModal 
                    isOpen={isDataModalOpen} 
                    onClose={() => setIsDataModalOpen(false)} 
                    currentData={trips} 
                    onImport={handleImportData}
                />
                <AnalyticsModal 
                    isOpen={isAnalyticsOpen}
                    onClose={() => setIsAnalyticsOpen(false)}
                    trips={trips}
                    theme={theme}
                />
                  <ConfirmationModal
                    isOpen={!!confirmAction}
                    onClose={handleModalClose}
                        onConfirm={handleConfirm}
                        title={modalTitle}
                        confirmButtonText={modalConfirmText}
                        cancelButtonText={modalCancelText}
                        isDestructive={isDestructive}
                    >
                        {modalBody}
                    </ConfirmationModal>
                </div>
            );
        }

        // --- Child Components ---

        function AnalyticsModal({ isOpen, onClose, trips, theme }) {
            const [isAnimating, setIsAnimating] = useState(false);
            const [chartType, setChartType] = useState('Bar'); // Bar, Line, Pie
            const [groupBy, setGroupBy] = useState('month'); // month, year, category, person
            const [metric, setMetric] = useState('paid'); // paid, share, net
            const [dataSource, setDataSource] = useState('all'); // all, or tripId
            const [hiddenSeries, setHiddenSeries] = useState({});
            const [viewMode, setViewMode] = useState('chart'); // chart, table
            const [drillDown, setDrillDown] = useState(null); // { filterType, filterValue, previousGroupBy }
            
            const chartRef = React.useRef(null);
            const chartInstanceRef = React.useRef(null);

            // Premium Gradient Palette (Base Colors)
            const MODERN_PALETTE = [
                { base: '#0ea5e9', end: '#38bdf8', fill: '0, 191, 255' },   // Deep Cyan to Light Cyan
                { base: '#10b981', end: '#34d399', fill: '16, 185, 129' },  // Deep Emerald to Light
                { base: '#8b5cf6', end: '#a78bfa', fill: '139, 92, 246' },  // Violet
                { base: '#f43f5e', end: '#fb7185', fill: '244, 63, 94' },   // Rose
                { base: '#f59e0b', end: '#fbbf24', fill: '245, 158, 11' },  // Amber
                { base: '#14b8a6', end: '#2dd4bf', fill: '20, 184, 166' },  // Teal
                { base: '#ec4899', end: '#f472b6', fill: '236, 72, 153' },  // Pink
                { base: '#6366f1', end: '#818cf8', fill: '99, 102, 241' }   // Indigo
            ];

            // Helper to dynamically generate colors avoiding exhaustion
            const getChartColor = (index) => {
                if (index < MODERN_PALETTE.length) return MODERN_PALETTE[index];
                
                // Use HSL for dynamic colors to ensure variety without overlapping
                // Golden angle approximation (137.5) spreads colors evenly around color wheel
                const hue = Math.floor((index * 137.508) % 360);
                const saturation = 70 + (index % 4) * 5; // 70-85%
                const lightness = 50 + (index % 3) * 10; // 50-70%
                
                // Convert HSL to RGB for the string 'fill' variable
                const s = saturation / 100;
                const l = lightness / 100;
                const c = (1 - Math.abs(2 * l - 1)) * s;
                const x = c * (1 - Math.abs((hue / 60) % 2 - 1));
                const m = l - c / 2;
                let r = 0, g = 0, b = 0;
                
                if (0 <= hue && hue < 60) { r = c; g = x; b = 0; }
                else if (60 <= hue && hue < 120) { r = x; g = c; b = 0; }
                else if (120 <= hue && hue < 180) { r = 0; g = c; b = x; }
                else if (180 <= hue && hue < 240) { r = 0; g = x; b = c; }
                else if (240 <= hue && hue < 300) { r = x; g = 0; b = c; }
                else if (300 <= hue && hue < 360) { r = c; g = 0; b = x; }
                
                const rInt = Math.round((r + m) * 255);
                const gInt = Math.round((g + m) * 255);
                const bInt = Math.round((b + m) * 255);

                return {
                    base: `hsl(${hue}, ${saturation}%, ${lightness - 10}%)`,
                    end: `hsl(${hue}, ${saturation}%, ${lightness + 10}%)`,
                    fill: `${rInt}, ${gInt}, ${bInt}`
                };
            };

            useEffect(() => {
                if (isOpen) {
                    requestAnimationFrame(() => setIsAnimating(true));
                } else {
                    setIsAnimating(false);
                    // Reset states when closed completely
                    setTimeout(() => { setDrillDown(null); }, 300);
                }
            }, [isOpen]);

            // Reset toggles when changing modes
            useEffect(() => {
                setHiddenSeries({});
            }, [chartType, groupBy, metric, dataSource]);
            
            // Switch away from Pie if Net Balance is selected
            useEffect(() => {
                if (metric === 'net' && chartType === 'Pie') {
                    setChartType('Bar');
                }
            }, [metric, chartType]);

            const handleClose = () => {
                setIsAnimating(false);
                setTimeout(onClose, 300);
            };

            const handleGroupByChange = (e) => {
                setGroupBy(e.target.value);
                setDrillDown(null); // Clear drill-down if the user manually changes the grouping
            };

            // Ensure chart is destroyed when modal closes or view mode changes
            useEffect(() => {
                if (!isOpen || viewMode !== 'chart') {
                    if (chartInstanceRef.current) {
                        chartInstanceRef.current.destroy();
                        chartInstanceRef.current = null;
                    }
                }
            }, [isOpen, viewMode]);

            const chartData = useMemo(() => {
                if (!trips || trips.length === 0) return { data: [], seriesKeys: [] };

                const filteredTrips = dataSource === 'all' ? trips : trips.filter(t => t.id === dataSource);
                const grouped = {};
                const seriesKeysSet = new Set();

                filteredTrips.forEach(trip => {
                    const tripGuestMap = trip.guests.reduce((acc, g) => ({...acc, [g.id]: g.name.trim()}), {});

                    trip.expenses.forEach(exp => {
                        const dateObj = new Date(exp.date);
                        const monthKey = dateObj.toLocaleString('en-US', { month: 'short', year: 'numeric' });
                        const yearKey = dateObj.getFullYear().toString();
                        const categoryKey = exp.category || 'Other';
                        
                        // --- Apply Drill Down Filtering ---
                        if (drillDown) {
                            if (drillDown.filterType === 'month' && monthKey !== drillDown.filterValue) return;
                            if (drillDown.filterType === 'year' && yearKey !== drillDown.filterValue) return;
                            if (drillDown.filterType === 'category' && categoryKey !== drillDown.filterValue) return;
                        }

                        let xKey;
                        if (groupBy === 'month') {
                            xKey = monthKey;
                        } else if (groupBy === 'year') {
                            xKey = yearKey;
                        } else if (groupBy === 'category') {
                            xKey = categoryKey;
                        } else if (groupBy === 'person') {
                            xKey = null; 
                        }

                        const valuesByPerson = {};
                        const totalAmount = parseFloat(exp.amount);
                        const payerName = tripGuestMap[exp.paidById] || 'Unknown';

                        const tempShares = {};
                        if (exp.splitType === 'equally') {
                            const share = totalAmount / exp.splitWith.length;
                            exp.splitWith.forEach(id => {
                                const name = tripGuestMap[id];
                                if(name) tempShares[name] = (tempShares[name] || 0) + share;
                            });
                        } else if (exp.splitType === 'amounts') {
                            Object.entries(exp.splitDetails || {}).forEach(([id, amt]) => {
                                const name = tripGuestMap[id];
                                if(name) tempShares[name] = (tempShares[name] || 0) + parseFloat(amt);
                            });
                        } else if (exp.splitType === 'percentages') {
                            Object.entries(exp.splitDetails || {}).forEach(([id, pct]) => {
                                const name = tripGuestMap[id];
                                if(name) tempShares[name] = (tempShares[name] || 0) + totalAmount * (parseFloat(pct)/100);
                            });
                        }

                        if (metric === 'paid') {
                            valuesByPerson[payerName] = (valuesByPerson[payerName] || 0) + totalAmount;
                        } else if (metric === 'share') {
                            Object.entries(tempShares).forEach(([name, amt]) => {
                                valuesByPerson[name] = (valuesByPerson[name] || 0) + amt;
                            });
                        } else if (metric === 'net') {
                            valuesByPerson[payerName] = (valuesByPerson[payerName] || 0) + totalAmount;
                            Object.entries(tempShares).forEach(([name, amt]) => {
                                valuesByPerson[name] = (valuesByPerson[name] || 0) - amt;
                            });
                        }

                        if (groupBy !== 'person') {
                            if (!grouped[xKey]) grouped[xKey] = { name: xKey, Total: 0, sortDate: dateObj.getTime() };
                            Object.entries(valuesByPerson).forEach(([person, val]) => {
                                grouped[xKey][person] = (grouped[xKey][person] || 0) + val;
                                grouped[xKey].Total += val;
                                seriesKeysSet.add(person);
                            });
                        } else {
                            Object.entries(valuesByPerson).forEach(([person, val]) => {
                                if (!grouped[person]) grouped[person] = { name: person, value: 0, originalIndex: seriesKeysSet.size };
                                grouped[person].value += val;
                                seriesKeysSet.add(person);
                            });
                        }
                    });
                });

                let result = Object.values(grouped);

                if (groupBy === 'month') {
                    result.sort((a, b) => a.sortDate - b.sortDate);
                } else if (groupBy === 'year') {
                    result.sort((a, b) => a.name.localeCompare(b.name));
                } else {
                    result.sort((a, b) => (b.Total !== undefined ? b.Total : b.value) - (a.Total !== undefined ? a.Total : a.value));
                }

                if (groupBy === 'person') {
                    result.forEach((r, i) => r.originalIndex = i);
                }

                return { data: result, seriesKeys: Array.from(seriesKeysSet) };
            }, [trips, dataSource, groupBy, metric, drillDown]);

            // Executive Summary KPIs
            const kpis = useMemo(() => {
                if (!trips || trips.length === 0) return null;
                const filteredTrips = dataSource === 'all' ? trips : trips.filter(t => t.id === dataSource);

                let totalSpend = 0;
                const catTotals = {};
                const payerTotals = {};
                const periodTotals = {};

                filteredTrips.forEach(trip => {
                    const tripMap = trip.guests.reduce((acc, g) => ({...acc, [g.id]: g.name.trim()}), {});
                    trip.expenses.forEach(exp => {
                        const amt = parseFloat(exp.amount) || 0;
                        totalSpend += amt;
                        
                        const cat = exp.category || 'Other';
                        catTotals[cat] = (catTotals[cat] || 0) + amt;
                        
                        const payer = tripMap[exp.paidById] || 'Unknown';
                        payerTotals[payer] = (payerTotals[payer] || 0) + amt;
                        
                        const dateObj = new Date(exp.date);
                        let periodKey;
                        if (groupBy === 'month') periodKey = dateObj.getFullYear() + '-' + String(dateObj.getMonth() + 1).padStart(2, '0');
                        else if (groupBy === 'year') periodKey = dateObj.getFullYear().toString();
                        
                        if (periodKey) {
                            periodTotals[periodKey] = (periodTotals[periodKey] || 0) + amt;
                        }
                    });
                });

                const topCat = Object.entries(catTotals).sort((a,b)=>b[1]-a[1])[0] || ['None', 0];
                const topPayer = Object.entries(payerTotals).sort((a,b)=>b[1]-a[1])[0] || ['None', 0];

                let trend = null;
                if ((groupBy === 'month' || groupBy === 'year')) {
                    const sortedPeriods = Object.keys(periodTotals).sort();
                    if (sortedPeriods.length >= 2) {
                        const current = periodTotals[sortedPeriods[sortedPeriods.length - 1]];
                        const previous = periodTotals[sortedPeriods[sortedPeriods.length - 2]];
                        if (previous > 0) {
                            const pctChange = ((current - previous) / previous) * 100;
                            trend = {
                                isPositive: pctChange > 0,
                                text: `${Math.abs(pctChange).toFixed(1)}% vs last period`
                            };
                        }
                    }
                }

                return { totalSpend, topCat, topPayer, trend };
            }, [trips, dataSource, groupBy]);

            useEffect(() => {
                if (!isOpen || !chartRef.current || chartData.data.length === 0 || !window.Chart || viewMode !== 'chart') return;

                const { data, seriesKeys } = chartData;
                
                const gridColor = theme === 'dark' ? 'rgba(255, 255, 255, 0.05)' : 'rgba(0, 0, 0, 0.05)';
                const tickColor = theme === 'dark' ? '#94a3b8' : '#64748b';
                const tooltipBg = theme === 'dark' ? 'rgba(15, 23, 42, 0.9)' : 'rgba(255, 255, 255, 0.95)';
                const tooltipTitle = theme === 'dark' ? '#fff' : '#1e293b';
                const tooltipBody = theme === 'dark' ? '#cbd5e1' : '#334155';
                const tooltipBorder = theme === 'dark' ? 'rgba(255, 255, 255, 0.1)' : 'rgba(0, 0, 0, 0.1)';
                const chartBgClass = theme === 'dark' ? '#0f172a' : '#fdfbf7'; 

                let labels = [];
                let datasets = [];

                if (chartType === 'Pie') {
                    const dataKey = groupBy === 'person' ? 'value' : 'Total';
                    const activeData = data.filter(d => !hiddenSeries[d.name]);
                    labels = activeData.map(d => d.name);
                    
                    datasets = [{
                        data: activeData.map(d => metric === 'net' ? Math.max(0, d[dataKey]) : d[dataKey]), // Only positive nets in pie
                        backgroundColor: function(context) {
                            const chart = context.chart;
                            const {ctx, chartArea} = chart;
                            if (!chartArea || context.dataIndex === undefined) return getChartColor(0).base;
                            const dataIndex = context.dataIndex;
                            const item = activeData[dataIndex];
                            const colorIndex = item && item.originalIndex !== undefined ? item.originalIndex : dataIndex;
                            const colorObj = getChartColor(colorIndex);
                            
                            if (chart.isHovering && !context.active) return `rgba(${colorObj.fill}, 0.15)`;
                            if (context.active) return colorObj.end;
                            
                            const gradient = ctx.createLinearGradient(chartArea.left, chartArea.top, chartArea.right, chartArea.bottom);
                            gradient.addColorStop(0, colorObj.end);
                            gradient.addColorStop(1, colorObj.base);
                            return gradient;
                        },
                        borderColor: function(context) {
                            if (context.active) return theme === 'dark' ? '#fff' : '#000';
                            return chartBgClass;
                        },
                        borderWidth: function(context) {
                            return context.active ? 4 : 3;
                        },
                        hoverOffset: 15
                    }];
                } else {
                    labels = data.map(d => d.name);

                    if (groupBy === 'person') {
                        const activeData = data.filter(d => !hiddenSeries[d.name]);
                        labels = activeData.map(d => d.name);

                        datasets = [{
                            label: metric === 'paid' ? 'Amount Paid' : metric === 'share' ? 'Share Owed' : 'Net Balance',
                            data: activeData.map(d => d.value),
                            backgroundColor: function(context) {
                                const chart = context.chart;
                                const {ctx, chartArea} = chart;
                                if (!chartArea || context.dataIndex === undefined) return getChartColor(0).base;
                                
                                const val = context.raw || 0;
                                let colorObj;

                                if (metric === 'net' && chartType === 'Bar') {
                                    colorObj = val >= 0 
                                        ? { base: '#10b981', end: '#34d399', fill: '16, 185, 129' } 
                                        : { base: '#f43f5e', end: '#fb7185', fill: '244, 63, 94' };
                                } else {
                                    const item = activeData[context.dataIndex];
                                    const colorIndex = item && item.originalIndex !== undefined ? item.originalIndex : context.dataIndex;
                                    colorObj = getChartColor(colorIndex);
                                }

                                if (chart.isHovering && !context.active) return `rgba(${colorObj.fill}, 0.15)`;
                                if (context.active && chartType === 'Bar') return colorObj.end;

                                if (chartType === 'Line') {
                                    const gradient = ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
                                    gradient.addColorStop(0, `rgba(${colorObj.fill}, 0.5)`);
                                    gradient.addColorStop(1, `rgba(${colorObj.fill}, 0.0)`);
                                    return gradient;
                                }

                                const gradient = ctx.createLinearGradient(0, chartArea.bottom, 0, chartArea.top);
                                gradient.addColorStop(0, colorObj.base);
                                gradient.addColorStop(1, colorObj.end);
                                return gradient;
                            },
                            borderColor: function(context) {
                                if (chartType === 'Bar') return context.active ? (theme === 'dark' ? '#fff' : '#000') : 'transparent';
                                if (context.raw === undefined) return getChartColor(0).base;
                                if (metric === 'net') return context.raw >= 0 ? '#34d399' : '#fb7185';
                                const item = activeData[context.dataIndex];
                                const colorIndex = item && item.originalIndex !== undefined ? item.originalIndex : context.dataIndex;
                                return getChartColor(colorIndex).end || getChartColor(0).end;
                            },
                            borderWidth: function(context) {
                                if (chartType === 'Line') return context.active ? 5 : 3;
                                return context.active ? 2 : 0;
                            },
                            borderRadius: chartType === 'Bar' ? { topLeft: 8, topRight: 8, bottomLeft: 0, bottomRight: 0 } : 0,
                            fill: chartType === 'Line',
                            tension: 0.4,
                            pointBackgroundColor: metric === 'net' ? '#34d399' : getChartColor(0).base,
                            pointBorderColor: chartBgClass,
                            pointBorderWidth: 2,
                            pointRadius: 5,
                            pointHoverRadius: 8
                        }];
                    } else {
                        const activeSeries = seriesKeys.filter(k => !hiddenSeries[k]);
                        
                        datasets = activeSeries.map((key) => {
                            const originalIndex = seriesKeys.indexOf(key);
                            const colorObj = getChartColor(originalIndex);

                            return {
                                label: key,
                                data: data.map(d => d[key] || 0),
                                backgroundColor: function(context) {
                                    const chart = context.chart;
                                    const {ctx, chartArea} = chart;
                                    if (!chartArea) return colorObj.base;
                                    
                                    if (chart.isHovering && !context.active) return `rgba(${colorObj.fill}, 0.15)`;
                                    if (context.active && chartType === 'Bar') return colorObj.end;

                                    if (chartType === 'Line') {
                                        const gradient = ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
                                        gradient.addColorStop(0, `rgba(${colorObj.fill}, 0.4)`);
                                        gradient.addColorStop(1, `rgba(${colorObj.fill}, 0.0)`);
                                        return gradient;
                                    }

                                    const gradient = ctx.createLinearGradient(0, chartArea.bottom, 0, chartArea.top);
                                    gradient.addColorStop(0, colorObj.base);
                                    gradient.addColorStop(1, colorObj.end);
                                    return gradient;
                                },
                                borderColor: function(context) {
                                    if (chartType === 'Line') return colorObj.end;
                                    return context.active ? (theme === 'dark' ? '#fff' : '#000') : 'transparent';
                                },
                                borderWidth: function(context) {
                                    if (chartType === 'Line') return context.active ? 5 : 3;
                                    return context.active ? 2 : 0;
                                },
                                borderRadius: chartType === 'Bar' ? { topLeft: 6, topRight: 6, bottomLeft: 0, bottomRight: 0 } : 0,
                                fill: chartType === 'Line',
                                tension: 0.4,
                                pointBackgroundColor: colorObj.end,
                                pointBorderColor: chartBgClass,
                                pointBorderWidth: 2,
                                pointRadius: 4,
                                pointHoverRadius: 7
                            };
                        });
                    }
                }

                const config = {
                    type: chartType.toLowerCase(),
                    data: { labels, datasets },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        animation: { 
                            duration: 800, 
                            easing: 'easeOutQuart',
                            delay: (context) => {
                                let delay = 0;
                                if (context.type === 'data' && context.mode === 'default') {
                                    // Stagger animation based on data index and dataset
                                    delay = context.dataIndex * 50 + context.datasetIndex * 20;
                                }
                                return delay;
                            }
                        },
                        interaction: {
                            mode: 'index',
                            intersect: false,
                        },
                        onClick: (event, elements, chart) => {
                            // Drill-Down feature
                            if (elements.length > 0 && groupBy !== 'person' && !drillDown) {
                                const dataIndex = elements[0].index;
                                const labelClicked = chart.data.labels[dataIndex];
                                setDrillDown({ filterType: groupBy, filterValue: labelClicked, previousGroupBy: groupBy });
                                setGroupBy('person'); // Drill down to Person view
                            }
                        },
                        onHover: (event, chartElement, chart) => {
                            const isHovering = chartElement.length > 0;
                            // Check if state changed to trigger a re-draw and dim effect

        function DataModal({ isOpen, onClose, currentData, onImport }) {

            const [inputText, setInputText] = useState('');
            const [message, setMessage] = useState({ text: '', type: '' }); // type: 'success' | 'error'
            const fileInputRef = React.useRef(null);

            useEffect(() => {
                if (isOpen) {
                    setInputText('');
                    setMessage({ text: '', type: '' });
                    setMode('export');
                }
            }, [isOpen]);

            const getExportData = () => JSON.stringify({ trips: currentData }, null, 2);

            const handleDownload = () => {
                try {
                    const dataStr = getExportData();
                    const blob = new Blob([dataStr], { type: "application/json" });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `ShareFare_Backup_${new Date().toISOString().split('T')[0]}.json`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                    setMessage({ text: 'File downloaded!', type: 'success' });
                    setTimeout(() => setMessage({ text: '', type: '' }), 3000);
                } catch (err) {
                    setMessage({ text: 'Failed to download file.', type: 'error' });
                }
            };

            const handleCopy = () => {
                const dataStr = getExportData();
                navigator.clipboard.writeText(dataStr).then(() => {
                    setMessage({ text: 'Data copied to clipboard!', type: 'success' });
                    setTimeout(() => setMessage({ text: '', type: '' }), 3000);
                }).catch(() => {
                    // Fallback for clipboard issues
                    const textArea = document.createElement("textarea");
                    textArea.value = dataStr;
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    try {
                        document.execCommand('copy');
                        setMessage({ text: 'Data copied to clipboard!', type: 'success' });
                        setTimeout(() => setMessage({ text: '', type: '' }), 3000);
                    } catch (err) {
                        setMessage({ text: 'Failed to copy. Please manually select and copy.', type: 'error' });
                    }
                    document.body.removeChild(textArea);
                });
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    setInputText(event.target.result);
                    setMessage({ text: 'File loaded. Click Import & Merge to proceed.', type: 'success' });
                    // Reset input so the same file can be selected again if needed
                    e.target.value = null;

                reader.onerror = () => {
                    setMessage({ text: 'Failed to read file.', type: 'error' });

                reader.readAsText(file);
            };

            const handleImport = () => {

                    const parsed = JSON.parse(inputText);
                    if (!parsed.trips || !Array.isArray(parsed.trips)) {

                    onImport(parsed.trips);
                    onClose();

            };

        function TourGuide({ isOpen, onClose, activeTrip, setActiveTripId, trips, currentStep, setCurrentStep }) {
            const [styles, setStyles] = useState({});

            const tourSteps = [
                {
                    title: "Welcome to ShareFare!",
                    content: "This quick guide will walk you through the main features. Let's get started!",
                    target: 'body',
                    placement: 'center',
                    page: 'home'
                },
                {
                    title: "Create a Trip",
                    content: "Everything starts here. Click this button to create a new trip or event for your group.",
                    target: '[data-tour="add-trip-button"]',
                    placement: 'bottom',
                    page: 'home'
                },
                {
                    title: "Manage Your Trips",
                    content: "Your created trips will appear here. Click 'Open' to manage expenses for that trip.",
                    target: '[data-tour="trip-list"]',
                    placement: 'bottom',
                    page: 'home',
                    requiresTrip: true,
                },
                {
                    title: "Add Your Guests",
                    content: "Once inside a trip, you can start adding the people you'll be sharing costs with.",
                    target: '[data-tour="add-guest-button"]',
                    placement: 'right',
                    page: 'trip'
                },
                {
                    title: "Log Your Expenses",
                    content: "Use the 'Quick Add' form for simple, equally-split expenses, or click 'More Options' for detailed splits.",
                    target: '[data-tour="quick-add-expense"]',
                    placement: 'right',
                    page: 'trip'
                },
                {
                    title: "Settle Up Automatically",
                    content: "The app does the math for you! This section shows the simplest way for everyone to pay each other back.",
                    target: '[data-tour="settle-up-card"]',
                    placement: 'top',
                    page: 'trip'
                },
                {
                    title: "You're All Set!",
                    content: "That's it! You can revisit this guide anytime by clicking the question mark icon in the header.",
                    target: 'body',
                    placement: 'center',
                    page: activeTrip ? 'trip' : 'home'
                }
            ];
            
            useEffect(() => {
                if (!isOpen) return;

                const step = tourSteps[currentStep];
                if (!step) return;

                const positionHighlighter = (retries = 5) => {
                    if (retries <= 0) {
                        console.warn("TourGuide could not find target element:", step.target);
                        return;
                    }

                    const element = document.querySelector(step.target);

                    if (element) {
                        // Use 'auto' for instant scrolling to get correct coordinates immediately
                        element.scrollIntoView({ behavior: 'auto', block: 'center', inline: 'center' });
                        
                        // Using requestAnimationFrame to ensure layout is updated before we measure.
                        requestAnimationFrame(() => {
                            const rect = element.getBoundingClientRect();
                            const popupStyle = {};
                            const highlighterStyle = {
                                // Add some padding around the element
                                top: `${rect.top - 5}px`,
                                left: `${rect.left - 5}px`,
                                width: `${rect.width + 10}px`,
                                height: `${rect.height + 10}px`,
                            };

                            const padding = 16;
                            const gap = 15; // Space between element and popup
                            const logicalPopupWidth = Math.min(320, window.innerWidth - 2 * padding);
                            const logicalPopupHeight = 180; // Estimated height for vertical positioning

                            switch (step.placement) {
                                case 'bottom':
                                case 'top':
                                    if (step.placement === 'bottom') {
                                        popupStyle.top = `${rect.bottom + gap}px`;
                                    } else { // 'top'
                                        popupStyle.bottom = `${window.innerHeight - rect.top + gap}px`;
                                    }
                                    // Center popup horizontally, then clamp to viewport edges. This prevents overlap and boundary issues.
                                    let centeredLeft = rect.left + (rect.width / 2) - (logicalPopupWidth / 2);
                                    popupStyle.left = `${Math.max(padding, Math.min(centeredLeft, window.innerWidth - logicalPopupWidth - padding))}px`;
                                    break;
                                
                                case 'right':
                                     // Vertically center popup relative to the element, clamped to viewport.
                                     let topPos = rect.top + (rect.height / 2) - (logicalPopupHeight / 2);
                                     popupStyle.top = `${Math.max(padding, Math.min(topPos, window.innerHeight - logicalPopupHeight - padding))}px`;
                                     
                                     // Check if it fits on the right
                                     if (rect.right + gap + logicalPopupWidth < window.innerWidth - padding) {
                                          popupStyle.left = `${rect.right + gap}px`;
                                     } 
                                     // Otherwise, check if it fits on the left
                                     else if (rect.left - logicalPopupWidth - gap > padding) {
                                          popupStyle.left = `${rect.left - logicalPopupWidth - gap}px`;
                                     } 
                                     // If neither right nor left works, place it on the bottom as a fallback.
                                     else {
                                         popupStyle.top = `${rect.bottom + gap}px`;
                                         let centeredLeftFallback = rect.left + (rect.width / 2) - (logicalPopupWidth / 2);
                                         popupStyle.left = `${Math.max(padding, Math.min(centeredLeftFallback, window.innerWidth - logicalPopupWidth - padding))}px`;
                                     }
                                    break;

                                default: // center
                                    popupStyle.top = '50%';
                                    popupStyle.left = '50%';
                                    popupStyle.transform = 'translate(-50%, -50%)';
                                    highlighterStyle.display = 'none';
                            }

                            setStyles({ popupStyle, highlighterStyle });
                        });
                    } else {
                         // Element not found, try again shortly.
                         // This is crucial for when the view is changing (e.g., home to trip page)
                        setTimeout(() => positionHighlighter(retries - 1), 100);
                    }
                };
                
                positionHighlighter();

            }, [isOpen, currentStep, activeTrip]);

            const handleNext = () => {
                const nextStepIndex = currentStep + 1;
                if (nextStepIndex >= tourSteps.length) {
                    onClose();
                    return;
                }

                const nextStep = tourSteps[nextStepIndex];
                const currentStepDef = tourSteps[currentStep];

                if (nextStep.page === 'trip' && currentStepDef.page === 'home') {
                    if (trips.length > 0) {
                        setActiveTripId(trips[0].id);
                        // Delay setting the step to give React time to render the new page
                        setTimeout(() => setCurrentStep(nextStepIndex), 50);
                    }
                } else {
                    setCurrentStep(nextStepIndex);
                }
            };

            const handlePrev = () => {
                const prevStepIndex = currentStep - 1;
                if (prevStepIndex < 0) return;

                const prevStep = tourSteps[prevStepIndex];
                const currentStepDef = tourSteps[currentStep];
                
                if (prevStep.page === 'home' && currentStepDef.page === 'trip') {
                      setActiveTripId(null);
                      // Delay setting the step to give React time to render the new page
                      setTimeout(() => setCurrentStep(prevStepIndex), 50);
                } else {
                    setCurrentStep(prevStepIndex);
                }
            };

            if (!isOpen) return null;
            const step = tourSteps[currentStep];
            if (!step) return null;

            return (
                <div className="fixed inset-0 z-[9998]" onClick={onClose}>
                    <div 
                        className="fixed rounded-lg transition-all duration-300 pointer-events-none"
                        style={{
                            ...styles.highlighterStyle,
                            boxShadow: '0 0 0 5000px rgba(15, 23, 42, 0.85)',
                        }}
                    ></div>
                    <div className="fixed glass-modal p-6 rounded-lg z-[9999] transition-all duration-500 cubic-bezier(0.34, 1.56, 0.64, 1) w-80 max-w-[calc(100vw-2rem)] shadow-2xl" style={styles.popupStyle} onClick={e => e.stopPropagation()}>
                        <div className="text-center">
                            <h2 className="text-xl font-bold mb-2 text-white">{step.title}</h2>
                            <p className="text-slate-300 mb-4 text-sm leading-relaxed">{step.content}</p>
                        </div>
                        <div className="flex justify-between items-center mt-2">
                            <span className="text-xs font-bold text-slate-400">{currentStep + 1} / {tourSteps.length}</span>
                            <div className="flex gap-2">
                                {currentStep > 0 && 
                                    <button onClick={handlePrev} className="py-1 px-3 bg-slate-700 hover:bg-slate-600 text-white rounded-md font-semibold transition-all active:scale-95 text-sm">Prev</button>
                                }
                                <button onClick={handleNext} className="py-1 px-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-md font-semibold transition-all active:scale-95 shadow-lg shadow-indigo-500/30 text-sm">
                                    {currentStep === tourSteps.length - 1 ? 'Finish' : 'Next'}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }
